name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions: none
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          output_action: none
          config_timezone: Asia/Shanghai
          config_padding: 0, +10%
          base: header, metadata, repositories
          base_indepth: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_categories: markup, programming
          plugin_languages_details: percentage, bytes-size, lines
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_sections: time, os-graphs, projects-graphs, editors
          plugin_wakatime_days: 30
          config_order: base.header, base.repositories, isocalendar, languages, wakatime
      - uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: /metrics_renders/metrics.svg
  deploy:
    needs: github-metrics
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: metrics
      - uses: actions/deploy-pages@v4
